name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: frontend

jobs:
  verify:
    name: verify (install + deps:check-pinned + lint + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          actual="$(yarn --version)"
          [ "$actual" = "1.22.22" ] || { echo "::error::corepack activation failed (got $actual, expected 1.22.22)"; exit 1; }
      - run: yarn install --frozen-lockfile
      - run: yarn deps:check-pinned
      - run: yarn lint
      - run: yarn build

  test:
    name: test (vitest)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable && corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      - run: yarn install --frozen-lockfile
      - run: yarn test

  audit:
    name: audit (yarn audit, no install)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable && corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      # Intentionally NO `yarn install` here. `yarn audit` reads yarn.lock
      # directly and queries the registry; skipping install means a
      # compromised postinstall can't execute inside the very gate that's
      # checking for compromised dependencies.
      - run: yarn audit:prod

  install-hooks:
    name: install-hooks (allowlist drift)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable && corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      # --ignore-scripts: defense in depth — the gate checking for malicious
      # install hooks must not itself run any install hook.
      - run: yarn install --frozen-lockfile --ignore-scripts
      - run: yarn audit:install-hooks

  lockfile-lint:
    name: lockfile-lint (registry/hostname validation)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version-file: frontend/.nvmrc
      - run: npx --yes lockfile-lint --path yarn.lock --type yarn --validate-https --allowed-hosts yarn npm --empty-hostname false

  all-checks-passed:
    name: All checks passed
    needs: [verify, test, audit, install-hooks, lockfile-lint]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write  # needed by the cron-failure step below
    # Override the workflow-level `working-directory: frontend`. This job
    # does no checkout, so the frontend/ dir doesn't exist in its workspace —
    # leaving the inherited default would make bash fail to start.
    defaults:
      run:
        working-directory: .
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
            || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] \
            || [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed"
            exit 1
          fi
