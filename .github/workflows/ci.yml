name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

defaults:
  run:
    working-directory: frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      - run: yarn install --frozen-lockfile
      - run: yarn lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      - run: yarn install --frozen-lockfile
      - run: yarn test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: frontend/.nvmrc
          cache: yarn
          cache-dependency-path: frontend/yarn.lock
      - name: Activate pinned Yarn via Corepack
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          [ "$(yarn --version)" = "1.22.22" ] || { echo "::error::corepack activation failed"; exit 1; }
      - run: yarn install --frozen-lockfile
      - run: yarn build

  all-checks-passed:
    name: All checks passed
    needs: [lint, test, build]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        working-directory: .
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "One or more required jobs did not succeed:"
            echo "  lint:  ${{ needs.lint.result }}"
            echo "  test:  ${{ needs.test.result }}"
            echo "  build: ${{ needs.build.result }}"
            exit 1
          fi
          echo "All required jobs succeeded."
